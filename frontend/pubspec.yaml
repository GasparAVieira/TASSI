name: navigation_diary
description: "TASSI's Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  cupertino_icons: ^1.0.8
  url_launcher: ^6.3.1
  permission_handler: ^12.0.1
  image_picker: ^1.2.1
  open_file: ^3.2.1
  video_thumbnail: ^0.5.6
  http: ^1.6.0
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/data/faqs_en.json
    - assets/data/faqs_pt.json
    - assets/data/gdpr_en.json
    - assets/data/gdpr_pt.json
